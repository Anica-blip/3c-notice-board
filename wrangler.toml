# wrangler.toml — 3C Notice Board Worker
# 3C Thread To Success™

name = "3c-notice-board"
main = "worker/index.js"
compatibility_date = "2024-09-23"
account_id = "5c482ede9d3c6e016b77a9cb86ed3a29"

# No [routes] / custom domain configured — this deploys automatically
# to the free Cloudflare address:
#   https://3c-notice-board.<your-workers-dev-subdomain>.workers.dev
# Find <your-workers-dev-subdomain> in the Cloudflare dashboard under
# Workers & Pages (same value across all your Workers). That full
# address + "/auth/callback" is the URL to add to the shared GitHub
# OAuth App's callback URL list — one addition, same App, same secret.

# R2 binding — the Worker's code refers to the bucket as env.NOTICE_BUCKET
[[r2_buckets]]
binding = "NOTICE_BUCKET"
bucket_name = "3c-library-files"

# Non-secret config — safe to commit
[vars]
# Shared "Anica-blip Tools" GitHub OAuth App — same Client ID used
# across your other worker.js setups. Only the Secret and this
# Worker's own callback URL need to be added on the GitHub side.
GITHUB_CLIENT_ID = "Ov23liE08ErtOUs8SrV6"
ALLOWED_GITHUB_LOGIN = "Anica-blip"

# GitHub Pages origin this Worker accepts requests from
ALLOWED_ORIGIN = "https://anica-blip.github.io"

# Where the browser lands after a successful login — the admin panel
FRONTEND_URL = "https://anica-blip.github.io/3c-notice-board/index.html"

# Secrets — NEVER go in this file. Set them with:
#   wrangler secret put GITHUB_CLIENT_SECRET
#   wrangler secret put SESSION_SECRET
