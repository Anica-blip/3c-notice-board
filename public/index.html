<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3C Notice Board</title>
  <link rel="icon" type="image/png" href="../assets/favicon.png" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="viewer.css" />
</head>
<body>

  <div class="viewer-wrap">
    <div class="logo-row">
      <img src="../assets/3C%20Thread%20To%20Success%20logo.png" alt="3C Thread To Success" />
    </div>
    <h1 class="neon-title">3C Notice Board</h1>

    <!-- Landing page — shown first, hidden after ENTER -->
    <div class="landing-section" id="landingSection" style="display:none;">
      <div class="landing-media" id="landingMedia"></div>
      <button class="btn-enter" id="enterBtn">Enter</button>
    </div>

    <!-- Slider section — hidden until ENTER is clicked -->
    <div id="sliderSection" style="display:none;">
      <div class="tv-frame">
        <div class="stage" id="stage">
          <!-- media-frame injected by viewer.js -->
        </div>
        <!-- TV bar: project title centred, actions right -->
        <div class="tv-bar" id="tvBar">
          <div class="tv-bar__title"></div>
          <div class="tv-bar__actions">
            <button class="tv-bar__btn" data-tv="share" title="Share this page">
              <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
            </button>
            <button class="tv-bar__btn" data-tv="open" title="Open full view">
              <svg viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            <button class="tv-bar__btn" data-tv="close" title="Close"
              onclick="window.history.length>1?history.back():window.close()">
              <svg viewBox="0 0 24 24"><path d="M9 4H5a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h4M15 16l5-5-5-5M20 11H9"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="slide-bar" id="slideBar" style="display:none;">
    <button class="icon-btn" id="prevBtn"></button>
    <span class="slide-counter" id="slideCounter">0 / 0</span>
    <button class="icon-btn" id="nextBtn"></button>
  </div>

  <script type="module" src="viewer.js?v=2"></script>
</body>
</html>
