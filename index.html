     3C NOTICE BOARD — ADMIN PANEL
     File: index.html  (repo root)
     ================================================ -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3C Notice Board — Admin</title>
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="watermark">
    Designed and Built with ❤️ by Claude (Anthropic) × Chef Anica · 3C Thread To Success™ Cooking Lab 🧪👨‍🍳
  </div>

  <header id="toolbar">
    <div id="toolbar-left">
      <img src="assets/3C%20Thread%20To%20Success%20logo.png" alt="3C Thread To Success" />
      <h1 class="neon-title">3C Notice Board — Admin</h1>
    </div>
    <div id="toolbar-right">
      <button class="icon-btn" id="logoutBtn" title="Log out">
        <svg viewBox="0 0 24 24"><path d="M9 4H5a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h4M15 16l5-5-5-5M20 11H9"/></svg>
      </button>
    </div>
  </header>

  <div class="admin-wrap">

    <form class="page-form" id="pageForm">
      <div class="row">
        <div>
          <label for="pageType">Page shape</label>
          <select id="pageType" required>
            <option value="portrait">Portrait (9:16)</option>
            <option value="landscape">Landscape (16:9)</option>
            <option value="square">Square (1:1)</option>
          </select>
        </div>
        <div>
          <label for="mediaType">Media type</label>
          <select id="mediaType" required>
            <option value="image">Image</option>
            <option value="video">Video</option>
            <option value="audio">Audio</option>
          </select>
        </div>
      </div>

      <div>
        <label for="fileInput">Upload new file</label>
        <input type="file" id="fileInput" />
      </div>

      <div>
        <label for="urlInput">— OR — link an existing Cloudflare/R2 URL</label>
        <input type="text" id="urlInput" placeholder="https://files.3c-public-library.org/..." />
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="shareableInput" checked />
        <label for="shareableInput">Show Download + Share on this page</label>
      </div>

      <div class="checkbox-row">
        <input type="checkbox" id="landingInput" />
        <label for="landingInput">This is the landing page</label>
      </div>

      <button type="submit" class="btn-toolbar btn-save" id="submitBtn">+ Add Page</button>
      <div class="status-msg" id="formStatus"></div>
    </form>

    <div id="slider-archive">
      <h2>Archive — Saved Pages</h2>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Shape</th>
            <th>Media</th>
            <th>Source</th>
            <th>Shareable</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="archiveBody"></tbody>
      </table>
    </div>
  </div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
